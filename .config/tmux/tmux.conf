# ============================================================================
# TMUX CONFIGURATION
# ============================================================================

# Prefix (GNU Screen style)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# Mouse support
set -g mouse on

# Increase scrollback history
set -g history-limit 100000

# ============================================================================
# SPLITS
# ============================================================================

# Create new panes in the current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Remove default split bindings
unbind '"'
unbind %

# ============================================================================
# PANE NAVIGATION
# ============================================================================

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Swap panes
bind < swap-pane -U
bind > swap-pane -D

# Toggle synchronized panes
bind S setw synchronize-panes

# ============================================================================
# WINDOWS
# ============================================================================

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Quickly jump back to previous window
bind Tab last-window

# ============================================================================
# COPY MODE
# ============================================================================

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ============================================================================
# STATUS BAR
# ============================================================================

set -g status-bg colour235
set -g status-fg white
set -g status-interval 5

set -g status-left '#[fg=green]#S #[fg=cyan]#I:#W#F '
set -g status-right '#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M'

# ============================================================================
# UTILITIES
# ============================================================================

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# ============================================================================
# USEFUL TMUX SHORTCUTS
# ============================================================================

# Prefix = Ctrl-a
#
# Sessions
# --------
# Prefix d      -> Detach session
# tmux ls       -> List sessions
# tmux attach   -> Reattach
#
# Windows
# -------
# Prefix c      -> New window
# Prefix ,      -> Rename window
# Prefix &      -> Kill window
# Prefix n      -> Next window
# Prefix p      -> Previous window
# Prefix Tab    -> Last window
# Prefix 1-9    -> Jump to window
#
# Panes
# -----
# Prefix |      -> Vertical split
# Prefix -      -> Horizontal split
# Prefix h/j/k/l-> Move between panes
# Prefix H/J/K/L-> Resize panes
# Prefix <      -> Move pane backward
# Prefix >      -> Move pane forward
# Prefix x      -> Kill pane
# Prefix z      -> Zoom/unzoom pane
# Prefix !      -> Break pane into a new window
# Prefix S      -> Toggle synchronized panes
#
# Copy Mode
# ---------
# Prefix [      -> Enter copy mode
# q or Esc      -> Exit copy mode
# v             -> Begin selection
# y             -> Copy selection
# /             -> Search forward
# ?             -> Search backward
# n / N         -> Next / previous search result
# gg / G        -> Top / bottom of history
#
# Misc
# ----
# Prefix r      -> Reload tmux configuration
# Prefix :      -> Command prompt
# Prefix ?      -> List all keybindings
